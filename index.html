<!DOCTYPE html>
<html lang="zh-TW" class="transition-colors duration-300">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2026 初春東京之旅</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Tailwind Config 啟用深色模式 -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', '"Helvetica Neue"', 'Arial', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    /* 自定義滾動條樣式與安全區域 */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 24px); }
    .custom-scrollbar::-webkit-scrollbar { width: 0px; background: transparent; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 貼心提醒的折疊動畫過渡 */
    .tips-content {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: all 0.3s ease-in-out;
      margin-top: 0;
    }
    .tips-content.expanded {
      max-height: 200px;
      opacity: 1;
      margin-top: 12px;
    }
    
    /* 確保深色模式平滑過渡 */
    body { transition: background-color 0.3s ease; }
  </style>
</head>
<body class="bg-stone-200/50 dark:bg-stone-950 flex justify-center h-[100dvh] overflow-hidden text-stone-800 dark:text-stone-200">

  <!-- 主容器 -->
  <div class="w-full max-w-5xl h-full relative flex flex-col overflow-hidden shadow-2xl transition-colors duration-300 bg-[#F9F9F8] dark:bg-[#121212]">
    
    <!-- 頂部標頭列 -->
    <header class="shrink-0 z-20 px-6 sm:px-8 py-4 flex justify-between items-center bg-[#F9F9F8]/90 dark:bg-[#121212]/90 backdrop-blur-md border-b border-stone-200/50 dark:border-stone-800">
      <div>
        <h1 class="text-xl md:text-2xl font-bold tracking-wide">2026 初春東京之旅</h1>
        <p class="text-xs md:text-sm font-bold text-stone-500 mt-1 tracking-wider">MAR 15 - MAR 17</p>
      </div>

      <!-- 電腦版導覽列 -->
      <div class="hidden md:flex items-center space-x-1 lg:space-x-4 absolute left-1/2 transform -translate-x-1/2" id="desktop-nav">
        <!-- 透過 JS 渲染 -->
      </div>

      <!-- 深色模式切換按鈕 -->
      <button onclick="toggleDarkMode()" class="p-2.5 rounded-full bg-white dark:bg-stone-800 shadow-sm border border-stone-200 dark:border-stone-700 text-stone-500 hover:text-stone-800 dark:hover:text-stone-200 transition-colors">
        <i data-lucide="sun" id="theme-icon-sun" class="w-5 h-5 md:w-6 md:h-6 hidden dark:block"></i>
        <i data-lucide="moon" id="theme-icon-moon" class="w-5 h-5 md:w-6 md:h-6 block dark:hidden"></i>
      </button>
    </header>

    <!-- 滾動內容區域 -->
    <main id="main-content" class="flex-1 overflow-y-auto px-5 sm:px-8 md:px-12 custom-scrollbar scroll-smooth relative" onscroll="handleScroll()">
      <!-- 內容透過 JS 注入 -->
    </main>

    <!-- 懸浮回到頂部按鈕 -->
    <button id="top-btn" onclick="scrollToTop()" class="absolute right-6 md:right-8 bottom-24 md:bottom-10 z-40 p-3.5 rounded-full bg-stone-800/90 dark:bg-stone-200/90 text-white dark:text-stone-900 shadow-[0_8px_30px_rgb(0,0,0,0.12)] backdrop-blur-sm transition-all duration-300 hover:scale-110 opacity-0 translate-y-10 pointer-events-none">
      <i data-lucide="arrow-up" class="w-6 h-6 md:w-7 md:h-7"></i>
    </button>

    <!-- 手機版底部導覽列 -->
    <nav class="md:hidden absolute bottom-0 w-full bg-white/90 dark:bg-stone-900/90 backdrop-blur-lg border-t border-stone-100 dark:border-stone-800 px-6 py-3 pb-safe z-30 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
      <div class="flex justify-around items-center" id="mobile-nav">
        <!-- 透過 JS 渲染 -->
      </div>
    </nav>

  </div>

  <!-- 應用程式邏輯 -->
  <script>
    // --- 資料定義區 ---
    const tripData = {
      days: [
        {
          day: 1, date: '3/15 (三)', title: '抵達與市區漫步',
          image: 'https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?auto=format&fit=crop&w=800&q=80',
          weather: { temp: '14°C', condition: '晴時多雲', icon: 'cloud-sun' },
          events: [
            { id: '1-1', time: '12:30', title: '抵達成田機場 (NRT)', transport: { icon: 'car', text: '預約包車前往市區', duration: '約 60 分鐘' }, tips: '出關人潮多，請務必先讓長輩在旁邊休息，並備妥 Visit Japan Web (VJW) 的 QR Code 截圖以加速通關。', mapQuery: '成田國際機場' },
            { id: '1-2', time: '15:00', title: '東急 STAY 澀谷 Check-in', transport: { icon: 'footprints', text: '抵達飯店', duration: '' }, tips: '稍作休息，整理行李。讓長輩喝口水、上個洗手間再出發。', mapQuery: 'Tokyu Stay Shibuya' },
            { id: '1-3', time: '16:30', title: '淺草寺 & 仲見世通', transport: { icon: 'train', text: '搭乘地鐵銀座線至淺草站', duration: '約 35 分鐘' }, tags: [{ type: 'buy', text: '人形燒' }], tips: '求籤後若抽到凶，記得把籤詩綁在指定區域的鐵絲架上。傍晚氣溫下降，記得幫長輩多準備一件薄外套。', mapQuery: '淺草寺' },
            { id: '1-4', time: '18:00', title: '晴空塔敘敘苑燒肉', transport: { icon: 'train', text: '搭乘地鐵淺草線', duration: '約 5 分鐘' }, tags: [{ type: 'res', text: '#XXY999' }, { type: 'eat', text: '極上牛舌' }], tips: '靠窗座位夜景極佳，請提早 10 分鐘抵達報到。', mapQuery: '敘敘苑 晴空塔店' }
          ]
        },
        {
          day: 2, date: '3/16 (四)', title: '文化與潮流的碰撞',
          image: 'https://images.unsplash.com/photo-1524413840807-0c3cb6fa808d?auto=format&fit=crop&w=800&q=80',
          weather: { temp: '16°C', condition: '晴朗', icon: 'sun' },
          events: [
            { id: '2-1', time: '10:00', title: '明治神宮', transport: { icon: 'train', text: '地鐵千代田線至明治神宮前站', duration: '約 20 分鐘' }, tips: '參道上碎石子路較多，請特別提醒長輩穿著好走的運動鞋，並留意腳步。', mapQuery: '明治神宮' },
            { id: '2-2', time: '13:00', title: '表參道 / 原宿商圈', transport: { icon: 'footprints', text: '步行前往', duration: '約 5 分鐘' }, tags: [{ type: 'eat', text: 'AFURI 柚子鹽拉麵' }, { type: 'eat', text: 'Marion Crepes 可麗餅' }], tips: '拉麵店可能需要排隊，若長輩不耐站，可先安排他們在附近咖啡廳稍坐。', mapQuery: '表參道' },
            { id: '2-3', time: '16:00', title: '澀谷 SKY 展望台', transport: { icon: 'train', text: '步行或搭乘一站地鐵至澀谷站', duration: '約 10 分鐘' }, tags: [{ type: 'res', text: '#SKY001' }], tips: '頂樓風非常大，且不能攜帶腳架與帽子。請準備有拉鍊口袋的外套放手機，以免隨身物品飛走。', mapQuery: 'SHIBUYA SKY' }
          ]
        },
        {
          day: 3, date: '3/17 (五)', title: '採買與滿載而歸',
          image: 'https://images.unsplash.com/photo-1551641506-ee5bf4cb45f1?auto=format&fit=crop&w=800&q=80',
          weather: { temp: '15°C', condition: '多雲', icon: 'cloud' },
          events: [
            { id: '3-1', time: '10:00', title: '上野阿美橫町', transport: { icon: 'train', text: '搭乘地鐵銀座線至上野站', duration: '約 25 分鐘' }, tags: [{ type: 'buy', text: '二木菓子' }, { type: 'buy', text: '熱門藥妝' }], tips: '市場內人潮非常擁擠，請長輩務必將隨身包包往前背，並隨時留意同行家人避免走散。', mapQuery: '阿美橫町' },
            { id: '3-2', time: '13:30', title: '前往成田機場 (NRT)', transport: { icon: 'train', text: '搭乘京成電鐵 Skyliner', duration: '約 45 分鐘' }, tips: '請預留充足時間辦理退稅與托運行李。', mapQuery: '成田國際機場' }
          ]
        }
      ],
      flights: {
        outbound: { airline: '星宇航空', flight: 'JX800', route: '桃園 (TPE) ➔ 成田 (NRT)', time: '08:30 - 12:30' },
        inbound: { airline: '星宇航空', flight: 'JX803', route: '成田 (NRT) ➔ 桃園 (TPE)', time: '16:15 - 18:55' }
      },
      hotel: {
        name: '東急 STAY 澀谷 (Tokyu Stay Shibuya)', address: '東京都澀谷區神泉町8-14', phone: '+81 3-3462-0109'
      },
      emergency: [
        { name: ['旅外國人急難救助', '全球免付費專線'], phone: ['800-', '0885-0885'], call: '800-0885-0885' },
        { name: ['日本報警電話'], phone: ['110'], call: '110' },
        { name: ['日本消防/救護電話'], phone: ['119'], call: '119' },
        { name: ['台北駐日經濟文化代表處', '(台灣駐東京大使館)'], phone: ['03-', '3280-7811'], call: '+81332807811', address: '東京都港區白金台5-20-2', mapQuery: '台北駐日經濟文化代表處' }
      ],
      guides: [
        { category: '必買伴手禮', icon: 'shopping-bag', color: 'rose', items: [
          { name: '二木菓子 (上野)', desc: '價格親民的零食批發，適合大量採購分送親友。' },
          { name: 'New York Perfect Cheese', desc: '東京車站極致排隊美食，起司奶油脆餅。' },
          { name: 'Press Butter Sand', desc: '焦糖奶油夾心餅乾，包裝極具質感。' },
          { name: '各式日本常備藥妝', desc: '合力他命、EVE止痛藥、Wakamoto (依需求適量購買)。' }
        ]},
        { category: '必吃美食推薦', icon: 'utensils', color: 'orange', items: [
          { name: 'AFURI 阿夫利', desc: '清爽的柚子鹽拉麵，適合不喜歡重口味的長輩。' },
          { name: '敘敘苑燒肉', desc: '午間套餐CP值極高，晚餐則能享受絕佳高空夜景與極上和牛。' },
          { name: '利久牛舌', desc: '厚切牛舌口感彈牙，搭配麥飯與山藥泥是絕配。' }
        ]}
      ]
    };

    const tabs = [
      { id: 'itinerary', icon: 'map-pin', label: '行程' },
      { id: 'guide', icon: 'shopping-bag', label: '攻略' },
      { id: 'tools', icon: 'info', label: '資訊' }
    ];

    // --- 狀態管理 ---
    let activeTab = 'itinerary';
    let isDarkMode = false;
    let expandedTips = new Set();
    
    // AI 探索狀態
    let aiState = {
      location: '',
      isSearching: false,
      results: null,
      error: ''
    };

    // --- 初始化與渲染邏輯 ---
    function init() {
      renderNav();
      renderContent();
    }

    function setActiveTab(tabId) {
      activeTab = tabId;
      renderNav();
      renderContent();
      document.getElementById('main-content').scrollTop = 0;
    }

    function toggleDarkMode() {
      isDarkMode = !isDarkMode;
      if (isDarkMode) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    }

    // --- 導覽列渲染 ---
    function renderNav() {
      // Desktop Nav
      const desktopNav = document.getElementById('desktop-nav');
      desktopNav.innerHTML = tabs.map(tab => `
        <button onclick="setActiveTab('${tab.id}')" class="flex items-center px-4 py-2 rounded-full transition-all duration-200 ${activeTab === tab.id ? 'bg-stone-800 text-white dark:bg-stone-200 dark:text-stone-900 font-bold shadow-sm' : 'text-stone-500 hover:bg-stone-200/50 dark:hover:bg-stone-800 font-bold'}">
          <i data-lucide="${tab.icon}" class="w-4 h-4 mr-2 ${activeTab === tab.id ? '' : 'opacity-70'}"></i>
          ${tab.label}
        </button>
      `).join('');

      // Mobile Nav
      const mobileNav = document.getElementById('mobile-nav');
      mobileNav.innerHTML = tabs.map(tab => `
        <button onclick="setActiveTab('${tab.id}')" class="flex flex-col items-center space-y-1 transition-colors ${activeTab === tab.id ? 'text-stone-800 dark:text-stone-200' : 'text-stone-400 hover:text-stone-600 dark:hover:text-stone-300'}">
          <i data-lucide="${tab.icon}" class="w-6 h-6 ${activeTab === tab.id ? 'fill-stone-100 dark:fill-stone-800' : ''}"></i>
          <span class="text-[10px] font-bold tracking-wider">${tab.label}</span>
        </button>
      `).join('');

      lucide.createIcons();
    }

    // --- 內容區域渲染 ---
    function renderContent() {
      const main = document.getElementById('main-content');
      if (activeTab === 'itinerary') main.innerHTML = getItineraryHTML();
      else if (activeTab === 'guide') main.innerHTML = getGuideHTML();
      else if (activeTab === 'tools') main.innerHTML = getToolsHTML();
      
      lucide.createIcons();
      
      // 綁定 AI 搜尋的事件監聽 (如果當前在攻略頁)
      if (activeTab === 'guide') {
        const input = document.getElementById('ai-search-input');
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') handleAISearch();
        });
      }
    }

    // --- 行程視圖 (Itinerary) ---
    function getItineraryHTML() {
      let daysHeader = `
        <div class="flex space-x-3 overflow-x-auto pb-4 sticky top-[-1px] z-10 bg-[#F9F9F8]/95 dark:bg-[#121212]/95 backdrop-blur-md -mx-5 px-5 sm:-mx-8 sm:px-8 md:-mx-12 md:px-12 pt-4 shadow-[0_4px_10px_rgba(0,0,0,0.02)] hide-scrollbar">
          ${tripData.days.map(d => `<button onclick="scrollToDay(${d.day})" class="whitespace-nowrap px-6 py-2.5 rounded-full bg-stone-800 dark:bg-stone-200 text-white dark:text-stone-900 text-sm font-bold shadow-sm transition-transform active:scale-95 hover:bg-stone-700 dark:hover:bg-stone-300">DAY ${d.day}</button>`).join('')}
        </div>
      `;

      let daysContent = tripData.days.map(day => `
        <div id="day-${day.day}" class="space-y-8 scroll-mt-24 pt-8 first:pt-4">
          <div class="relative h-48 md:h-64 rounded-3xl overflow-hidden shadow-sm group">
            <img src="${day.image}" alt="${day.title}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
            
            <div class="absolute top-4 right-4 bg-white/90 dark:bg-stone-900/90 backdrop-blur-sm px-4 py-2 rounded-full flex items-center space-x-2 text-sm font-bold text-stone-800 dark:text-stone-200 shadow-sm">
              <i data-lucide="${day.weather.icon}" class="w-4 h-4 text-stone-600 dark:text-stone-400"></i>
              <span>${day.weather.temp}</span>
              <span class="text-xs text-stone-500 font-medium">${day.weather.condition}</span>
            </div>

            <div class="absolute bottom-5 left-6 md:bottom-6 md:left-8">
              <div class="text-white/80 text-sm font-bold tracking-wider mb-1 md:mb-2">DAY ${day.day} • ${day.date}</div>
              <h2 class="text-2xl md:text-3xl font-bold text-white tracking-wide">${day.title}</h2>
            </div>
          </div>

          <div class="px-2 md:px-4">
            ${day.events.map(event => getEventCardHTML(event)).join('')}
          </div>
        </div>
      `).join('');

      return `<div class="space-y-8 md:space-y-12 pb-24 md:pb-12 max-w-3xl mx-auto">${daysHeader}${daysContent}</div>`;
    }

    function getEventCardHTML(event) {
      const gmapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(event.mapQuery)}&travelmode=transit`;
      const isExpanded = expandedTips.has(event.id);
      
      let tagsHtml = '';
      if (event.tags) {
        const tagStyles = {
          eat: { bg: 'bg-orange-100 dark:bg-orange-900/40', text: 'text-orange-700 dark:text-orange-300', icon: 'utensils' },
          buy: { bg: 'bg-rose-100 dark:bg-rose-900/40', text: 'text-rose-700 dark:text-rose-300', icon: 'shopping-bag' },
          res: { bg: 'bg-emerald-100 dark:bg-emerald-900/40', text: 'text-emerald-700 dark:text-emerald-300', icon: 'ticket' }
        };
        tagsHtml = `<div class="flex flex-wrap mt-3">` + event.tags.map(t => {
          const s = tagStyles[t.type];
          return `<span class="inline-flex items-center px-2 py-1 rounded-md text-xs font-medium mr-2 mb-2 ${s.bg} ${s.text}"><i data-lucide="${s.icon}" class="w-3 h-3 mr-1"></i>${t.text}</span>`;
        }).join('') + `</div>`;
      }

      let tipsHtml = '';
      if (event.tips) {
        tipsHtml = `
          <div class="mt-3 pt-3 border-t border-stone-100 dark:border-stone-700">
            <button onclick="toggleTip('${event.id}')" class="flex items-center justify-between w-full text-sm text-stone-600 dark:text-stone-400 font-medium hover:text-stone-800 dark:hover:text-stone-200 transition-colors">
              <div class="flex items-center">
                <i data-lucide="alert-circle" class="w-4 h-4 mr-2 text-amber-500"></i>
                💡 展開貼心提醒
              </div>
              <i data-lucide="${isExpanded ? 'chevron-up' : 'chevron-down'}" id="tip-icon-${event.id}" class="w-4 h-4"></i>
            </button>
            <div id="tip-content-${event.id}" class="tips-content ${isExpanded ? 'expanded' : ''}">
              <p class="text-sm text-stone-600 dark:text-stone-300 bg-amber-50/80 dark:bg-amber-900/20 p-4 rounded-xl leading-relaxed">${event.tips}</p>
            </div>
          </div>
        `;
      }

      return `
        <div class="relative pl-6 pb-8 border-l-2 border-stone-200 dark:border-stone-700 last:border-transparent last:pb-0 transition-all duration-300 hover:pl-7">
          <div class="absolute left-[-9px] top-1 w-4 h-4 rounded-full bg-stone-300 dark:bg-stone-600 border-4 border-[#F9F9F8] dark:border-[#121212]"></div>
          
          <div class="inline-flex items-center space-x-2 mb-2 text-xs font-medium text-stone-500 dark:text-stone-400 bg-stone-100 dark:bg-stone-800 px-3 py-1.5 rounded-full">
            <i data-lucide="${event.transport.icon}" class="w-4 h-4"></i>
            <span>${event.transport.text}</span>
            ${event.transport.duration ? `<span class="w-1 h-1 rounded-full bg-stone-400"></span><span>${event.transport.duration}</span>` : ''}
          </div>

          <div class="bg-white dark:bg-stone-800/90 rounded-2xl p-5 md:p-6 shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-stone-100 dark:border-stone-700/50 hover:shadow-lg transition-shadow">
            <div class="flex justify-between items-start mb-2">
              <div>
                <div class="text-sm font-bold text-stone-400 dark:text-stone-500 mb-1">${event.time}</div>
                <h3 class="text-lg md:text-xl font-bold text-stone-800 dark:text-stone-100">${event.title}</h3>
              </div>
              <a href="${gmapsUrl}" target="_blank" rel="noopener noreferrer" class="flex flex-col items-center justify-center p-2 rounded-xl bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 hover:bg-blue-100 transition-colors shrink-0 ml-4">
                <i data-lucide="navigation" class="w-5 h-5 mb-0.5"></i>
                <span class="text-[10px] font-bold">路線</span>
              </a>
            </div>
            ${tagsHtml}
            ${tipsHtml}
          </div>
        </div>
      `;
    }

    function toggleTip(eventId) {
      const content = document.getElementById(`tip-content-${eventId}`);
      const icon = document.getElementById(`tip-icon-${eventId}`);
      
      if (expandedTips.has(eventId)) {
        expandedTips.delete(eventId);
        content.classList.remove('expanded');
        // Simple swap icon via innerHTML is easiest for lucide
        icon.outerHTML = `<i data-lucide="chevron-down" id="tip-icon-${eventId}" class="w-4 h-4"></i>`;
      } else {
        expandedTips.add(eventId);
        content.classList.add('expanded');
        icon.outerHTML = `<i data-lucide="chevron-up" id="tip-icon-${eventId}" class="w-4 h-4"></i>`;
      }
      lucide.createIcons();
    }

    function scrollToDay(day) {
      const el = document.getElementById(`day-${day}`);
      if (el) el.scrollIntoView({ behavior: 'smooth' });
    }

    // --- 實用資訊視圖 (Tools) ---
    function getToolsHTML() {
      const f = tripData.flights;
      const h = tripData.hotel;
      
      const emergencyHTML = tripData.emergency.map(item => `
        <div class="flex flex-col bg-white dark:bg-stone-800/80 p-4 md:p-5 rounded-2xl shadow-sm hover:shadow-md transition-shadow">
          <div class="flex justify-between items-start">
            <div class="text-sm md:text-base font-bold text-stone-700 dark:text-stone-300">
              ${item.name.map((line, i) => `<div class="${i > 0 ? 'text-xs md:text-sm font-medium text-stone-500' : ''}">${line}</div>`).join('')}
            </div>
            <a href="tel:${item.call}" class="text-red-600 dark:text-red-400 font-bold md:text-lg tracking-wider hover:underline text-right shrink-0 pl-3">
              ${item.phone.map(line => `<div>${line}</div>`).join('')}
            </a>
          </div>
          ${item.address ? `
            <div class="mt-4 pt-4 border-t border-stone-100 dark:border-stone-700 flex justify-between items-center">
              <div class="flex items-start text-xs md:text-sm font-medium text-stone-500 dark:text-stone-400 pr-2">
                <i data-lucide="map-pin" class="w-4 h-4 mr-1 shrink-0 mt-0.5"></i>
                <span class="leading-relaxed">${item.address}</span>
              </div>
              <a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(item.mapQuery)}&travelmode=transit" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center shrink-0 px-3 py-1.5 md:px-4 md:py-2 rounded-xl bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 hover:bg-blue-100 transition-colors">
                <i data-lucide="navigation" class="w-3 h-3 md:w-4 md:h-4 mr-1 md:mr-1.5"></i>
                <span class="text-[10px] md:text-xs font-bold">導航</span>
              </a>
            </div>
          ` : ''}
        </div>
      `).join('');

      return `
        <div class="pb-24 md:pb-12 pt-4 max-w-4xl mx-auto">
          <h2 class="text-2xl md:text-3xl font-bold mb-8 px-2">實用資訊</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <section class="bg-white dark:bg-stone-800/80 rounded-3xl p-6 shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-stone-100 dark:border-stone-700/50">
              <h3 class="flex items-center text-lg md:text-xl font-bold mb-5"><i data-lucide="plane" class="w-5 h-5 md:w-6 md:h-6 mr-2 text-stone-500"></i> 航班資訊</h3>
              <div class="space-y-4">
                <div class="p-4 bg-stone-50 dark:bg-stone-900/50 rounded-2xl hover:bg-stone-100 dark:hover:bg-stone-900 transition-colors">
                  <div class="text-xs font-bold text-stone-400 mb-1">去程航班 | ${f.outbound.time}</div>
                  <div class="font-bold text-base md:text-lg text-stone-700 dark:text-stone-300">${f.outbound.airline} ${f.outbound.flight}</div>
                  <div class="text-sm text-stone-500 mt-1">${f.outbound.route}</div>
                </div>
                <div class="p-4 bg-stone-50 dark:bg-stone-900/50 rounded-2xl hover:bg-stone-100 dark:hover:bg-stone-900 transition-colors">
                  <div class="text-xs font-bold text-stone-400 mb-1">回程航班 | ${f.inbound.time}</div>
                  <div class="font-bold text-base md:text-lg text-stone-700 dark:text-stone-300">${f.inbound.airline} ${f.inbound.flight}</div>
                  <div class="text-sm text-stone-500 mt-1">${f.inbound.route}</div>
                </div>
              </div>
            </section>

            <section class="bg-white dark:bg-stone-800/80 rounded-3xl p-6 shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-stone-100 dark:border-stone-700/50 flex flex-col">
              <h3 class="flex items-center text-lg md:text-xl font-bold mb-5"><i data-lucide="hotel" class="w-5 h-5 md:w-6 md:h-6 mr-2 text-stone-500"></i> 住宿資訊</h3>
              <div class="p-5 bg-stone-50 dark:bg-stone-900/50 rounded-2xl flex-1 flex flex-col justify-center">
                <div class="font-bold text-xl md:text-2xl mb-4">${h.name}</div>
                <div class="flex items-start text-sm md:text-base text-stone-600 dark:text-stone-400 mb-3"><i data-lucide="map-pin" class="w-4 h-4 md:w-5 md:h-5 mr-2 mt-0.5 shrink-0"></i>${h.address}</div>
                <div class="flex items-center text-sm md:text-base text-stone-600 dark:text-stone-400"><i data-lucide="phone" class="w-4 h-4 md:w-5 md:h-5 mr-2 shrink-0"></i>${h.phone}</div>
              </div>
            </section>

            <section class="bg-red-50 dark:bg-red-900/10 rounded-3xl p-6 border border-red-100 dark:border-red-900/30 md:col-span-2 mt-2">
              <h3 class="flex items-center text-lg md:text-xl font-bold text-red-700 dark:text-red-400 mb-5"><i data-lucide="alert-circle" class="w-5 h-5 md:w-6 md:h-6 mr-2"></i> 緊急聯絡電話</h3>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">${emergencyHTML}</div>
            </section>

          </div>
        </div>
      `;
    }

    // --- 攻略與 AI 視圖 (Guide) ---
    function getGuideHTML() {
      const guidesHTML = tripData.guides.map(guide => `
        <section class="bg-white dark:bg-stone-800/80 rounded-3xl p-6 shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-stone-100 dark:border-stone-700/50 hover:shadow-md transition-shadow">
          <h3 class="flex items-center text-lg md:text-xl font-bold mb-5 pb-3 border-b border-stone-100 dark:border-stone-700">
            <i data-lucide="${guide.icon}" class="w-5 h-5 md:w-6 md:h-6 mr-2 text-${guide.color}-500"></i> ${guide.category}
          </h3>
          <ul class="space-y-5">
            ${guide.items.map(item => `
              <li class="flex flex-col group">
                <span class="font-bold text-base md:text-lg mb-1 group-hover:text-stone-600 dark:group-hover:text-stone-300 transition-colors">• ${item.name}</span>
                <span class="text-sm md:text-base font-medium text-stone-500 dark:text-stone-400 pl-4 leading-relaxed">${item.desc}</span>
              </li>
            `).join('')}
          </ul>
        </section>
      `).join('');

      // AI 搜尋結果區塊渲染邏輯
      let aiResultsHTML = '';
      if (aiState.error) {
        aiResultsHTML = `<div class="p-4 mb-6 text-sm font-bold text-red-600 bg-red-50 dark:bg-red-900/20 rounded-xl">${aiState.error}</div>`;
      } else if (aiState.results && !aiState.isSearching) {
        const categories = [
          { key: 'meals', title: '正餐餐廳', icon: 'utensils', color: 'text-orange-500' },
          { key: 'cafes', title: '下午茶咖啡館', icon: 'coffee', color: 'text-amber-600' },
          { key: 'attractions', title: '其他景點', icon: 'map', color: 'text-emerald-500' }
        ];

        let gridContent = categories.map(cat => {
          if (!aiState.results[cat.key] || aiState.results[cat.key].length === 0) return '';
          const items = aiState.results[cat.key].map(item => `
            <div class="flex flex-col justify-between bg-stone-50 dark:bg-stone-900/50 p-4 rounded-2xl shadow-sm border border-stone-100 dark:border-stone-800 hover:shadow-md transition-shadow group">
              <div class="mb-4">
                <div class="font-bold text-base mb-1">${item.name}</div>
                <div class="text-xs md:text-sm font-medium text-stone-500 dark:text-stone-400 leading-relaxed">${item.desc}</div>
              </div>
              <a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(item.mapQuery)}&travelmode=walking" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center w-full py-2 rounded-xl bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 hover:bg-blue-100 transition-colors">
                <i data-lucide="navigation" class="w-4 h-4 mr-1.5"></i>
                <span class="text-xs font-bold">步行導航</span>
              </a>
            </div>
          `).join('');

          return `
            <div class="space-y-4">
              <h4 class="flex items-center text-base md:text-lg font-bold">
                <i data-lucide="${cat.icon}" class="w-5 h-5 mr-2 ${cat.color}"></i> ${cat.title}
              </h4>
              <div class="space-y-3">${items}</div>
            </div>
          `;
        }).join('');

        if (gridContent) {
          aiResultsHTML = `<div class="mt-8 border-t border-stone-100 dark:border-stone-700 pt-8 grid grid-cols-1 md:grid-cols-3 gap-8">${gridContent}</div>`;
        }
      }

      return `
        <div class="pb-24 md:pb-12 pt-4 max-w-4xl mx-auto">
          <h2 class="text-2xl md:text-3xl font-bold mb-8 px-2">採買與美食攻略</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">${guidesHTML}</div>
          
          <section class="bg-white dark:bg-stone-800/80 rounded-3xl p-6 shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-stone-100 dark:border-stone-700/50 md:p-8">
            <h3 class="flex items-center text-xl font-bold mb-2">
              <i data-lucide="compass" class="w-6 h-6 mr-2 text-blue-500"></i> 附近探索 (AI 推薦)
            </h3>
            <p class="text-sm md:text-base font-medium text-stone-500 dark:text-stone-400 mb-6 leading-relaxed max-w-2xl">
              輸入您目前的所在地（地鐵站、景點等），讓我們為您尋找走路 15 分鐘內的私房正餐、下午茶與景點。
            </p>

            <div class="flex space-x-3 mb-6 max-w-2xl">
              <div class="relative flex-1">
                <i data-lucide="search" class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-stone-400"></i>
                <input type="text" id="ai-search-input" placeholder="例如：澀谷站、雷門..." value="${aiState.location}" onchange="aiState.location = this.value" class="w-full pl-11 pr-4 py-3 bg-stone-50 dark:bg-stone-900 border border-stone-200 dark:border-stone-700 rounded-xl md:text-lg focus:outline-none focus:ring-2 focus:ring-stone-300 dark:focus:ring-stone-600 transition-shadow text-stone-800 dark:text-stone-200 font-medium" />
              </div>
              <button id="ai-search-btn" onclick="handleAISearch()" ${aiState.isSearching || !aiState.location.trim() && !document.getElementById('ai-search-input')?.value.trim() ? 'disabled' : ''} class="px-6 py-3 bg-stone-800 dark:bg-stone-200 text-white dark:text-stone-900 font-bold rounded-xl shadow-sm hover:bg-stone-700 dark:hover:bg-stone-300 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center shrink-0">
                ${aiState.isSearching ? `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>` : '搜尋'}
              </button>
            </div>
            
            <div id="ai-results-container">${aiResultsHTML}</div>
          </section>
        </div>
      `;
    }

    // --- AI API 串接邏輯 ---
    async function handleAISearch() {
      const input = document.getElementById('ai-search-input');
      const val = input.value.trim();
      if (!val) return;

      aiState.location = val;
      aiState.isSearching = true;
      aiState.error = '';
      
      // 更新按鈕狀態
      const btn = document.getElementById('ai-search-btn');
      btn.disabled = true;
      btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>`;
      lucide.createIcons();

      try {
        const apiKey = "AIzaSyDtkX8lMD1iJoBALE7VUBkjmU7Yrcr2ujY"; // 請在此填入您的 Gemini API Key
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        
        const prompt = `使用者目前在日本東京的「${aiState.location}」，請推薦附近走路15分鐘內的：1. 正餐餐廳 (至多3個) 2. 下午茶咖啡館 (至多3個) 3. 其他景點 (至多3個)。請以 JSON 格式回傳，格式必須嚴格如下：
        {
          "meals": [{ "name": "店名", "desc": "一句簡單介紹說明", "mapQuery": "Google Map 搜尋用的精確字串(含地名與日本東京)" }],
          "cafes": [{ "name": "店名", "desc": "一句簡單介紹說明", "mapQuery": "Google Map 搜尋用的精確字串(含地名與日本東京)" }],
          "attractions": [{ "name": "景點名", "desc": "一句簡單介紹說明", "mapQuery": "Google Map 搜尋用的精確字串(含地名與日本東京)" }]
        }`;

        const options = {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { responseMimeType: "application/json" }
          })
        };

        const res = await fetch(url, options);
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        const data = await res.json();
        const jsonText = data.candidates?.[0]?.content?.parts?.[0]?.text;
        
        if (!jsonText) throw new Error("無效的回傳格式");
        aiState.results = JSON.parse(jsonText);
        
      } catch (err) {
        aiState.error = '搜尋發生錯誤，請確認 API Key 或網路狀態後稍後再試。';
        console.error(err);
      } finally {
        aiState.isSearching = false;
        if (activeTab === 'guide') renderContent(); // 重新渲染該頁面以顯示結果
      }
    }

    // --- 捲動與置頂 ---
    function handleScroll() {
      const main = document.getElementById('main-content');
      const topBtn = document.getElementById('top-btn');
      
      if (main.scrollTop > 300) {
        topBtn.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
        topBtn.classList.add('opacity-100', 'translate-y-0');
      } else {
        topBtn.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
        topBtn.classList.remove('opacity-100', 'translate-y-0');
      }
    }

    function scrollToTop() {
      const main = document.getElementById('main-content');
      main.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 啟動應用程式
    window.onload = init;
  </script>
</body>
</html>
